<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring AI - YouTube Search Agent (Exam08)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>  
  <link href="/css/springai.css" rel="stylesheet" />
  <script>
    // YouTube 비디오 정보를 카드 형태로 표시하는 함수
    function displayYoutubeVideos(videos) {
      const container = document.getElementById('resultsContainer');
      
      if (!videos || videos.length === 0) {
        container.innerHTML = '<div class="alert alert-warning">검색 결과가 없습니다.</div>';
        return;
      }

      let html = '<div class="row g-3">';
      videos.forEach((video, index) => {
        // YouTube 썸네일 추출 (링크에서 videoId 추출)
        const videoId = video.link ? video.link.split('v=')[1]?.split('&')[0] : '';
        const thumbnail = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : '';
        
        html += `
          <div class="col-md-6">
            <div class="card h-100">
              <div class="card-header" style="background-color: #212529; color: white;">
                <h5 class="mb-0">🎬 ${video.title || '제목 없음'}</h5>
              </div>
              <div class="card-body">
                ${thumbnail ? `<img src="${thumbnail}" class="img-fluid mb-3 rounded" alt="썸네일">` : ''}
                <p class="card-text"><strong>📅 업로드:</strong> ${video.uploadDate || '날짜 미상'}</p>
                <hr>
                <div class="text-end">
                  <a href="${video.link}" target="_blank" class="btn btn-dark">
                    유튜브에서 보기
                  </a>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    // 제출 버튼을 클릭했을 때 실행하는 함수
    async function handleSubmit() {
      try {
        const question = document.getElementById("question").value;
        if (question === "") return;

        // 결과 컨테이너 초기화
        document.getElementById('resultsContainer').innerHTML = '';
        
        // 사용자 질문 표시
        document.getElementById('userQuery').textContent = question;
        document.getElementById('resultsSection').classList.remove('d-none');

        // 스피너 보여주기
        document.getElementById('spinner').classList.remove('d-none');

        // AJAX 요청하고 응답받기
        const response = await fetch('/ai/exam08-youtube-search', {
          method: "post",
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'application/json'
          },
          body: new URLSearchParams({ question })
        });

        const videos = await response.json();
        displayYoutubeVideos(videos);

      } catch (error) {
        console.error(error);
        document.getElementById('resultsContainer').innerHTML = 
          '<div class="alert alert-danger">오류가 발생했습니다: ' + error.message + '</div>';
      } finally {
        document.getElementById('spinner').classList.add('d-none');
      }
    }
  </script>
</head>

<body>
  <div class="d-flex flex-column vh-100">
    <div id="headPanel" class="navbar justify-content-between">
      <a href="/" class="navbar-brand ps-2">
        <img src="/image/spring_ai_logo_with_text.svg" width="200" />
      </a>
      <div id="spinner" class="spinner-border text-success d-none me-3" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="flex-grow-1 container-fluid my-3" style="overflow-y:auto;">
      <div class="card mb-3">
        <div class="card-header" style="background-color: #212529; color: white;">
          <h5 class="mb-0">Exam08: YouTube 검색 에이전트</h5>
        </div>
        <div class="card-body">
          <p class="mb-0">
            <small class="text-muted">
              YouTube API를 통해 영상을 검색합니다. 여행지나 관심사를 입력하면 관련 비디오를 추천합니다.
            </small>
          </p>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <div class="p-2 border-bottom mb-2">
            <small class="text-muted">샘플 질문:</small>
            <button type="button" class="btn btn-outline-secondary btn-sm ms-1" 
                    onclick="document.getElementById('question').value='제주도 여행'">제주도 여행</button>
            <button type="button" class="btn btn-outline-secondary btn-sm ms-1" 
                    onclick="document.getElementById('question').value='부산 맛집'">부산 맛집</button>
            <button type="button" class="btn btn-outline-secondary btn-sm ms-1" 
                    onclick="document.getElementById('question').value='서울 카페 투어'">서울 카페 투어</button>
          </div>
          <div class="input-group">
            <span class="input-group-text">질문</span>
            <textarea id="question" class="form-control" rows="2">제주도 여행</textarea>
            <span class="input-group-text">
              <button type="button" class="btn" style="background-color: #212529; color: white;" onclick="handleSubmit()">검색</button>
            </span>
          </div>
        </div>
      </div>

      <div id="resultsSection" class="d-none">
        <div class="card">
          <div class="card-header">
            <h6 class="mb-0">검색 결과: <span style="color: #212529;" id="userQuery"></span></h6>
          </div>
          <div class="card-body">
            <div id="resultsContainer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
